version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mercadinho_db
    environment:
      POSTGRES_DB: mercadinho
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mercadinho_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mercadinho_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres123@db:5432/mercadinho
      JWT_SECRET: mercadinho_jwt_secret_key_2024
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - mercadinho_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mercadinho_frontend
    environment:
      NUXT_PUBLIC_API_BASE: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mercadinho_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  mercadinho_network:
    driver: bridge